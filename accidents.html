<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>철도사고 조회 | 철도안전정보종합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: { 900: "#1f2747", 800: "#253056", 700: "#2e3a67" },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/css/branding-logo.css" />
    <style>
      .accidents-filter-control {
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        background-color: #fff;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        line-height: 1.25rem;
        color: #1f2937;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .accidents-filter-control:hover {
        border-color: #9ca3af;
      }
      .accidents-filter-control:focus {
        border-color: #2e3a67;
        outline: none;
        box-shadow: 0 0 0 3px rgba(46, 58, 103, 0.15);
      }
      .accidents-col-casualty {
        width: 5.75rem;
        min-width: 5.75rem;
        max-width: 5.75rem;
      }
      .accidents-search-fields {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem 0.625rem;
      }
      @media (min-width: 768px) {
        .accidents-search-fields {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (min-width: 1280px) {
        .accidents-search-fields {
          grid-template-columns:
            minmax(0, 1.15fr)
            minmax(0, 0.9fr)
            minmax(0, 1.15fr)
            minmax(0, 0.95fr)
            minmax(0, 1.35fr);
          column-gap: 0.75rem;
        }
      }
      .accidents-search-field {
        min-width: 0;
      }
      .accidents-search-field-period .accidents-search-date-range {
        display: flex;
        align-items: center;
        gap: 0.375rem;
        width: 100%;
      }
      .accidents-search-date {
        min-width: 0;
        flex: 1 1 0;
        width: auto;
        padding-left: 0.5rem;
        padding-right: 0.5rem;
      }
    </style>
  </head>
  <body class="min-h-screen overflow-x-hidden bg-gray-100 text-gray-800">
    <div class="flex min-h-screen flex-col">
      <header>
        <div class="bg-navy-900 text-white">
          <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
            <a href="/portal" class="flex min-w-0 items-center gap-2 sm:gap-3" aria-label="포털 메인으로 이동">
              <span data-branding-wrap="logo" class="branding-logo-box hidden shrink-0">
                <img id="branding-logo" alt="CI logo" />
              </span>
              <span
                id="branding-ci-mark"
                class="hidden shrink-0 rounded bg-white/15 px-2 py-0.5 text-[11px] font-semibold sm:text-xs"
              ></span>
              <h1 data-branding="system-name" class="truncate text-sm font-bold sm:text-base md:text-lg">
                철도안전정보종합관리시스템
              </h1>
            </a>
            <div class="flex flex-wrap items-center justify-end gap-2 text-xs sm:text-sm">
              <a
                id="portal-admin-link"
                href="/admin"
                class="hidden rounded bg-amber-500 px-2 py-1 text-[11px] font-semibold text-navy-900 hover:bg-amber-400 sm:text-xs"
              >
                관리자
              </a>
              <span id="portal-user-name" class="text-gray-100">사용자님</span>
              <button
                id="portal-logout-btn"
                type="button"
                class="rounded bg-white px-2 py-1 text-[11px] font-semibold text-navy-900 hover:bg-gray-100 sm:px-3 sm:text-xs"
              >
                로그아웃
              </button>
            </div>
          </div>
        </div>
        <div class="bg-navy-800 text-white">
          <nav class="mx-auto max-w-7xl overflow-visible px-4 sm:px-6 lg:px-8" aria-label="주 메뉴">
            <ul id="portal-nav-list" class="flex items-center gap-6 overflow-visible py-3 text-sm font-medium whitespace-nowrap">
              <li class="text-gray-300">메뉴 로딩 중...</li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="flex-1 px-4 py-6 sm:px-6 lg:px-8">
        <div class="mx-auto max-w-[1600px]">
          <div class="flex flex-col gap-6 lg:flex-row lg:items-start">
            <aside id="portal-section-sidebar" class="hidden w-full shrink-0 lg:w-56"></aside>
            <div class="min-w-0 flex-1">
          <h2 id="accidents-page-title" class="text-lg font-bold text-gray-900">사고 등록/조회</h2>
          <p id="accidents-page-desc" class="mt-1 hidden text-sm text-gray-600"></p>

          <div id="accidents-summary-wrap" class="mt-6 hidden">
            <div id="accidents-summary"></div>
          </div>

          <div id="accidents-list-wrap" class="mt-4">
            <form
              id="accidents-search-form"
              class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm"
              autocomplete="off"
            >
              <div class="border-b border-gray-100 bg-[#f4f6f9] px-4 py-2.5">
                <p class="text-sm font-semibold text-gray-800">검색 조건</p>
              </div>

              <div class="p-4">
                <div class="accidents-search-fields">
                  <div class="accidents-search-field">
                    <label for="filter-agency" class="mb-1.5 block text-xs font-medium text-gray-600">등록기관</label>
                    <select
                      id="filter-agency"
                      name="agency"
                      class="accidents-filter-control w-full"
                    >
                      <option value="">전체</option>
                    </select>
                  </div>
                  <div class="accidents-search-field">
                    <label for="filter-rail-category" class="mb-1.5 block text-xs font-medium text-gray-600">철도구분</label>
                    <select id="filter-rail-category" name="railCategory" class="accidents-filter-control w-full">
                      <option value="">전체</option>
                    </select>
                  </div>
                  <div class="accidents-search-field">
                    <label for="filter-line" class="mb-1.5 block text-xs font-medium text-gray-600">노선</label>
                    <select id="filter-line" name="lineName" class="accidents-filter-control w-full">
                      <option value="">전체</option>
                    </select>
                  </div>
                  <div class="accidents-search-field">
                    <label for="filter-type-l1" class="mb-1.5 block text-xs font-medium text-gray-600">사고유형</label>
                    <select id="filter-type-l1" class="accidents-filter-control w-full">
                      <option value="">전체</option>
                      <option value="사고">사고</option>
                      <option value="준사고">준사고</option>
                      <option value="운행장애">운행장애</option>
                      <option value="운행장애(관리)">운행장애(관리)</option>
                    </select>
                  </div>
                  <div class="accidents-search-field accidents-search-field-period">
                    <label class="mb-1.5 block text-xs font-medium text-gray-600">기간</label>
                    <div class="accidents-search-date-range">
                      <input id="filter-start-date" name="startDate" type="date" class="accidents-filter-control accidents-search-date" />
                      <span class="shrink-0 text-sm text-gray-400">~</span>
                      <input id="filter-end-date" name="endDate" type="date" class="accidents-filter-control accidents-search-date" />
                    </div>
                  </div>
                </div>
              </div>

              <div class="flex justify-end border-t border-gray-100 bg-gray-50/60 px-4 py-3">
                <button
                  type="submit"
                  class="rounded-md bg-navy-800 px-6 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-navy-700 focus:outline-none focus:ring-2 focus:ring-navy-700/30"
                >
                  검색
                </button>
              </div>
            </form>

            <div id="accidents-table-wrap" class="mt-4 border border-gray-300 bg-white">
              <div class="flex flex-wrap items-center justify-between gap-2 border-b border-gray-300 px-3 py-2 text-sm text-gray-700">
                <p>
                  총 <span id="accidents-total" class="font-semibold text-navy-900">0</span>개 /
                  현재페이지 <span id="accidents-current-page">1</span>/<span id="accidents-total-pages">1</span>
                </p>
                <div class="flex flex-wrap items-center gap-2">
                  <button
                    type="button"
                    id="accidents-bulk-upload-btn"
                    class="hidden rounded border border-emerald-700 bg-emerald-700 px-3 py-0.5 text-sm font-semibold text-white hover:bg-emerald-600"
                  >
                    일괄등록(엑셀 업로드)
                  </button>
                  <input id="accidents-bulk-file-input" type="file" accept=".xlsx,.xls" class="hidden" />
                  <button
                    type="button"
                    id="accidents-attachment-upload-btn"
                    class="hidden rounded border border-violet-700 bg-violet-700 px-3 py-0.5 text-sm font-semibold text-white hover:bg-violet-600"
                  >
                    첨부파일 DB 업데이트
                  </button>
                  <input id="accidents-attachment-file-input" type="file" accept=".xlsx,.xls" class="hidden" />
                  <button
                    type="button"
                    id="accidents-attachment-sample-btn"
                    class="hidden rounded border border-violet-700 bg-white px-3 py-0.5 text-sm font-semibold text-violet-700 hover:bg-violet-50"
                  >
                    샘플 폼 다운받기
                  </button>
                  <button
                    type="button"
                    id="accidents-export-accident-btn"
                    class="rounded border border-navy-800 bg-navy-800 px-3 py-0.5 text-sm font-semibold text-white hover:bg-navy-700"
                  >
                    사고정보 다운로드(엑셀)
                  </button>
                  <label class="flex items-center gap-2">
                    <span class="text-gray-600">View</span>
                    <select id="accidents-page-size" class="border border-gray-300 px-2 py-0.5 text-sm">
                      <option value="15" selected>15</option>
                      <option value="30">30</option>
                      <option value="50">50</option>
                    </select>
                  </label>
                </div>
              </div>
              <div class="overflow-x-auto">
                <table class="min-w-full border-collapse text-xs">
                  <thead>
                    <tr class="border-b border-gray-300 bg-[#e8eef5] text-center text-gray-800">
                      <th class="w-8 border-r border-gray-300 px-1 py-2">
                        <input id="accidents-check-all" type="checkbox" class="rounded border-gray-400" aria-label="전체 선택" />
                      </th>
                      <th class="whitespace-nowrap border-r border-gray-300 px-2 py-2 font-semibold">일련번호</th>
                      <th class="whitespace-nowrap border-r border-gray-300 px-2 py-2 font-semibold">발생일시</th>
                      <th class="whitespace-nowrap border-r border-gray-300 px-2 py-2 font-semibold">등록기관</th>
                      <th class="whitespace-nowrap border-r border-gray-300 px-2 py-2 font-semibold">노선</th>
                      <th class="whitespace-nowrap border-r border-gray-300 px-2 py-2 font-semibold">사고/장애구분</th>
                      <th class="accidents-col-casualty whitespace-nowrap border-r border-gray-300 px-2 py-2 font-semibold">사망</th>
                      <th class="accidents-col-casualty whitespace-nowrap border-r border-gray-300 px-2 py-2 font-semibold">부상(중상)</th>
                      <th class="whitespace-nowrap border-r border-gray-300 px-2 py-2 font-semibold">피해액(백만원)</th>
                      <th id="accidents-col-report-header" class="whitespace-nowrap border-r border-gray-300 px-2 py-2 font-semibold">조사보고서</th>
                      <th class="whitespace-nowrap px-2 py-2 font-semibold">상세</th>
                    </tr>
                  </thead>
                  <tbody id="accidents-table-body" class="divide-y divide-gray-200 bg-white text-center text-gray-800">
                    <tr>
                      <td colspan="11" class="px-4 py-8 text-sm text-gray-500">불러오는 중...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div class="flex flex-wrap items-center justify-between gap-2 border-t border-gray-300 px-3 py-2">
                <button
                  type="button"
                  id="accidents-delete-selected-btn"
                  class="hidden rounded border border-red-700 bg-red-700 px-3 py-0.5 text-xs font-semibold text-white hover:bg-red-600"
                >
                  체크된 데이터 삭제
                </button>
                <div class="flex items-center justify-center gap-1">
                  <button type="button" id="accidents-page-first" class="border border-gray-300 px-2 py-0.5 text-xs hover:bg-gray-50">«</button>
                  <button type="button" id="accidents-page-prev" class="border border-gray-300 px-2 py-0.5 text-xs hover:bg-gray-50">‹</button>
                  <span id="accidents-page-numbers" class="flex gap-1 px-2"></span>
                  <button type="button" id="accidents-page-next" class="border border-gray-300 px-2 py-0.5 text-xs hover:bg-gray-50">›</button>
                  <button type="button" id="accidents-page-last" class="border border-gray-300 px-2 py-0.5 text-xs hover:bg-gray-50">»</button>
                </div>
              </div>
            </div>
          </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/usage-tracker.js"></script>
    <script src="/js/branding.js"></script>
    <script src="/js/board-layout.js"></script>
    <script src="/js/menus.js"></script>
    <script src="/js/accident-db-columns.js"></script>
    <script src="/js/accident-kind-category.js"></script>
    <script src="/js/accident-detail-investigation-reports.js"></script>
    <script src="/js/accidents-page.js"></script>
  </body>
</html>
