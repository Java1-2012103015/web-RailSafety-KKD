<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>철도안전 투자공시 DB | 철도안전정보종합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: { 900: "#1f2747", 800: "#253056", 700: "#2e3a67" },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/css/branding-logo.css" />
  </head>
  <body data-inv-page="db" class="min-h-screen overflow-x-hidden bg-gray-100 text-gray-800">
    <div class="flex min-h-screen flex-col">
      <header>
        <div class="bg-navy-900 text-white">
          <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
            <a href="/portal" class="flex min-w-0 items-center gap-2 sm:gap-3" aria-label="포털 메인으로 이동">
              <span data-branding-wrap="logo" class="branding-logo-box hidden shrink-0">
                <img id="branding-logo" alt="CI logo" />
              </span>
              <span id="branding-ci-mark" class="hidden shrink-0 rounded bg-white/15 px-2 py-0.5 text-[11px] font-semibold sm:text-xs"></span>
              <h1 data-branding="system-name" class="truncate text-sm font-bold tracking-tight sm:text-base md:text-lg">
                철도안전정보종합관리시스템
              </h1>
            </a>
            <div class="flex flex-wrap items-center justify-end gap-2 text-xs sm:text-sm">
              <a id="portal-admin-link" href="/admin" class="hidden rounded bg-amber-500 px-2 py-1 text-[11px] font-semibold text-navy-900 hover:bg-amber-400 sm:text-xs">관리자</a>
              <span id="portal-user-name" class="text-gray-100">사용자님</span>
              <button id="portal-logout-btn" type="button" class="rounded bg-white px-2 py-1 text-[11px] font-semibold text-navy-900 hover:bg-gray-100 sm:px-3 sm:text-xs">로그아웃</button>
            </div>
          </div>
        </div>
        <div class="bg-navy-800 text-white">
          <nav class="mx-auto max-w-7xl overflow-visible px-4 sm:px-6 lg:px-8" aria-label="주 메뉴">
            <ul id="portal-nav-list" class="flex items-center gap-6 overflow-visible py-3 text-sm font-medium whitespace-nowrap">
              <li class="text-gray-300">메뉴 로딩 중...</li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="flex-1 px-4 py-6 sm:px-6 lg:px-8">
        <div class="mx-auto max-w-7xl">
          <div class="flex flex-col gap-6 lg:flex-row lg:items-start">
            <aside id="portal-section-sidebar" class="hidden w-full shrink-0 lg:w-56"></aside>
            <div class="min-w-0 flex-1 space-y-6">
          <div class="flex flex-wrap items-start justify-between gap-3">
            <div>
              <h2 class="text-xl font-bold text-gray-900">철도안전 투자공시 DB</h2>
              <p class="mt-1 text-sm text-gray-600">기관별 공시 원본 데이터 조회·다운로드 (금액 단위: 백만원)</p>
            </div>
            <div class="flex flex-wrap items-center gap-2 shrink-0">
              <div id="inv-admin-upload-wrap" class="hidden flex flex-wrap items-center gap-2">
                <div class="flex rounded border border-gray-300 bg-white p-0.5 text-[10px] font-bold">
                  <button type="button" data-inv-portal-encoding="EUC-KR" class="inv-portal-encoding-btn rounded px-2 py-1 bg-navy-900 text-white">EUC-KR</button>
                  <button type="button" data-inv-portal-encoding="UTF-8" class="inv-portal-encoding-btn rounded px-2 py-1 text-gray-600">UTF-8</button>
                </div>
                <input id="inv-admin-csv-file" type="file" accept=".csv,text/csv" class="hidden" />
                <button
                  id="inv-admin-upload-btn"
                  type="button"
                  class="rounded bg-navy-900 px-3 py-2 text-xs font-semibold text-white shadow-sm hover:bg-navy-800"
                >
                  DB 입력 (CSV)
                </button>
                <span id="inv-admin-upload-status" class="text-xs text-gray-500 max-w-[200px]"></span>
              </div>
              <a href="/dashboard/investment-disclosure" class="text-sm text-navy-700 hover:underline whitespace-nowrap">분석 대시보드</a>
            </div>
          </div>

          <div id="inv-loading" class="rounded border border-gray-300 bg-white px-6 py-10 text-center text-sm text-gray-500 shadow-sm">데이터를 불러오는 중...</div>
          <div id="inv-empty" class="hidden rounded border border-amber-200 bg-amber-50 px-6 py-10 text-center text-sm text-amber-800"></div>

          <div id="inv-content" class="hidden space-y-6">
            <!-- 필터: 기관 다중 선택 -->
            <section class="rounded border border-gray-300 bg-white px-5 py-4 shadow-sm">
              <div class="relative max-w-lg">
                <p class="text-xs font-bold text-navy-700">철도·도시철도 운영사</p>
                <button
                  id="inv-agency-toggle"
                  type="button"
                  class="mt-2 flex w-full items-center justify-between gap-2 rounded border border-gray-300 bg-white px-3 py-2.5 text-left text-sm text-gray-800 hover:border-navy-700 focus:outline-none focus:ring-1 focus:ring-navy-700"
                  aria-expanded="false"
                  aria-haspopup="listbox"
                >
                  <span id="inv-agency-toggle-label" class="truncate">전체 운영사</span>
                  <span class="shrink-0 text-gray-400" aria-hidden="true">▼</span>
                </button>
                <div
                  id="inv-agency-panel"
                  class="absolute left-0 right-0 z-30 mt-1 hidden rounded border border-gray-300 bg-white shadow-lg"
                  role="listbox"
                >
                  <div class="border-b border-gray-100 px-3 py-2">
                    <label class="flex cursor-pointer items-center gap-2 text-sm font-semibold text-navy-800">
                      <input id="inv-agency-check-all" type="checkbox" class="rounded border-gray-300" checked />
                      전체 운영사
                    </label>
                  </div>
                  <div id="inv-agency-checkboxes" class="max-h-56 overflow-y-auto px-3 py-2 space-y-1.5"></div>
                  <div class="flex items-center justify-end gap-2 border-t border-gray-100 px-3 py-2">
                    <button
                      id="inv-agency-clear"
                      type="button"
                      class="rounded border border-gray-300 px-2.5 py-1 text-xs font-semibold text-gray-600 hover:bg-gray-50"
                    >
                      초기화
                    </button>
                    <button
                      id="inv-agency-apply"
                      type="button"
                      class="rounded bg-navy-900 px-3 py-1 text-xs font-semibold text-white hover:bg-navy-800"
                    >
                      조회
                    </button>
                  </div>
                </div>
              </div>
            </section>

            <!-- 테이블 -->
            <section class="rounded border border-gray-300 bg-white p-5 shadow-sm overflow-hidden">
              <div class="flex flex-wrap items-center justify-between gap-3 mb-4 pb-3 border-b border-gray-200">
                <div>
                  <h3 class="text-base font-bold text-gray-900">기관 공시현황(원본)</h3>
                  <p class="text-xs text-gray-500 mt-0.5">매칭 레코드: <strong id="inv-record-count" class="text-navy-800">0</strong>건</p>
                </div>
                <button id="inv-export-btn" type="button" class="rounded border border-gray-300 px-3 py-2 text-xs font-semibold hover:bg-gray-50">다운로드</button>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                  <thead>
                    <tr class="border-b border-gray-200 text-xs font-bold text-gray-500">
                      <th class="py-2 px-3">기관명</th>
                      <th class="py-2 px-3">공시년도</th>
                      <th class="py-2 px-3">구분1</th>
                      <th class="py-2 px-3">구분2</th>
                      <th class="py-2 px-3">구분3</th>
                      <th class="py-2 px-3">연도구분</th>
                      <th class="py-2 px-3 text-right">금액(백만원)</th>
                    </tr>
                  </thead>
                  <tbody id="inv-table-body"></tbody>
                </table>
              </div>
              <div id="inv-pager" class="hidden flex items-center justify-between pt-4 mt-4 border-t border-gray-200">
                <span id="inv-page-info" class="text-xs text-gray-500"></span>
                <div class="flex gap-2">
                  <button id="inv-page-prev" type="button" class="px-3 py-1 text-xs border rounded disabled:opacity-40">이전</button>
                  <button id="inv-page-next" type="button" class="px-3 py-1 text-xs border rounded disabled:opacity-40">다음</button>
                </div>
              </div>
            </section>
          </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/branding.js"></script>
    <script src="/js/board-layout.js"></script>
    <script src="/js/menus.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="/js/investment-disclosure.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", initInvestmentDisclosurePage);
    </script>
  </body>
</html>
