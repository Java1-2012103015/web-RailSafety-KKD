<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사고·장애정보 대시보드 | 철도안전정보종합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: {
                900: "#1f2747",
                800: "#253056",
                700: "#2e3a67",
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/css/branding-logo.css" />
    <style>
      .dashboard-tab-nav {
        display: flex;
        width: 100%;
      }
      .dashboard-tab-btn {
        flex: 1 1 0;
        min-width: 0;
        border: 1px solid transparent;
        border-bottom: none;
        padding: 0.625rem 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #4b5563;
        background: #f9fafb;
        text-align: center;
        transition: background-color 0.15s, color 0.15s;
      }
      .dashboard-tab-btn:hover {
        color: #1f2747;
        background: #fff;
      }
      .dashboard-tab-btn-active {
        background: #fff;
        color: #1f2747;
        font-weight: 600;
        border-color: #d1d5db;
        border-top: 2px solid #253056;
        margin-bottom: -1px;
      }
    </style>
  </head>
  <body
    id="top"
    data-public-dashboard="true"
    class="min-h-screen overflow-x-hidden bg-gray-100 text-gray-800"
  >
    <header class="bg-navy-900 text-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
        <a href="/public/dashboard/accidents" class="flex min-w-0 items-center gap-2 sm:gap-3" aria-label="공개 대시보드">
          <span data-branding-wrap="logo" class="branding-logo-box hidden shrink-0">
            <img id="branding-logo" alt="CI logo" />
          </span>
          <span
            id="branding-ci-mark"
            class="hidden shrink-0 rounded bg-white/15 px-2 py-0.5 text-[11px] font-semibold"
          ></span>
          <div class="min-w-0">
            <p class="text-xs text-gray-300">Rail Safety Public Dashboard</p>
            <h1 data-branding="system-name" class="truncate text-base font-bold sm:text-lg">
              철도안전정보종합관리시스템
            </h1>
          </div>
        </a>
      </div>
    </header>

    <main class="px-4 py-8 sm:px-6 sm:py-10 lg:px-8">
      <div class="mx-auto max-w-7xl">
        <div class="flex flex-col gap-6 lg:flex-row lg:items-start">
          <aside id="public-section-sidebar" class="hidden w-full shrink-0 lg:w-56"></aside>
          <div class="min-w-0 flex-1 space-y-6">
            <div class="flex flex-wrap items-end justify-between gap-3">
              <div>
                <h2 class="text-xl font-bold text-gray-900">사고·장애정보 대시보드</h2>
                <p class="mt-1 text-sm text-gray-600">당해·최근 5년 사고·장애 및 사상자 발생현황</p>
              </div>
              <p class="text-xs text-gray-500">갱신: <span id="portal-stat-updated">-</span></p>
            </div>

            <div id="portal-dashboard-wrap" class="relative">
              <div
                id="portal-dashboard-loading"
                class="absolute inset-0 z-10 flex items-center justify-center rounded-sm bg-white/85"
                role="status"
                aria-live="polite"
                aria-label="통계 불러오는 중"
              >
                <div class="flex flex-col items-center gap-3">
                  <div
                    class="h-11 w-11 animate-spin rounded-full border-[3px] border-gray-200 border-t-navy-800"
                  ></div>
                  <p class="text-sm font-medium text-gray-600">통계를 불러오는 중...</p>
                </div>
              </div>
              <div
                id="portal-dashboard-content"
                class="space-y-6 opacity-0 pointer-events-none"
                aria-busy="true"
              >
                <div id="portal-dashboard-tabs" class="hidden">
                  <div class="border border-gray-300 bg-white">
                    <nav class="dashboard-tab-nav" role="tablist" aria-label="대시보드 탭">
                      <button
                        type="button"
                        id="dashboard-tab-btn-current-year"
                        class="dashboard-tab-btn dashboard-tab-btn-active"
                        data-dashboard-tab="current-year"
                        role="tab"
                        aria-selected="true"
                      >
                        사고·장애 발생현황
                      </button>
                      <button
                        type="button"
                        class="dashboard-tab-btn"
                        data-dashboard-tab="recent5-events"
                        role="tab"
                        aria-selected="false"
                      >
                        최근 5년 사고·장애 발생현황
                      </button>
                      <button
                        type="button"
                        class="dashboard-tab-btn"
                        data-dashboard-tab="recent5-casualties"
                        role="tab"
                        aria-selected="false"
                      >
                        최근 5년 사상자 발생현황
                      </button>
                    </nav>
                  </div>

                  <div id="dashboard-tab-panel-current-year" class="dashboard-tab-panel mt-4 space-y-6" role="tabpanel">
                    <div id="portal-yearly-status-section" class="grid gap-4 lg:grid-cols-2">
                      <div class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                        <h3 id="chart-yearly-accidents-title" class="mb-3 text-sm font-bold text-gray-900">
                          2026년 철도사고 발생현황
                        </h3>
                        <div class="h-80">
                          <canvas id="chart-yearly-accidents-status"></canvas>
                        </div>
                      </div>
                      <div class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                        <h3 id="chart-yearly-disruptions-title" class="mb-3 text-sm font-bold text-gray-900">
                          2026년 운행장애 발생현황
                        </h3>
                        <div class="h-80">
                          <canvas id="chart-yearly-disruptions-status"></canvas>
                        </div>
                      </div>
                    </div>

                    <section id="year-status-root">
                      <div class="grid gap-4 lg:grid-cols-2">
                        <div
                          id="panel-year-accidents"
                          class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm"
                        ></div>
                        <div
                          id="panel-year-disruptions"
                          class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm"
                        ></div>
                      </div>
                    </section>
                  </div>

                  <div id="dashboard-tab-panel-recent5-events" class="dashboard-tab-panel mt-4 hidden space-y-4" role="tabpanel" aria-hidden="true">
                    <div class="flex flex-wrap items-end gap-4 rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                      <div class="min-w-[140px]">
                        <label for="filter-dashboard-rail-events" class="mb-1.5 block text-xs font-medium text-gray-600">철도구분</label>
                        <select id="filter-dashboard-rail-events" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm">
                          <option value="전체">전체</option>
                        </select>
                      </div>
                      <div class="min-w-[160px]">
                        <label for="filter-dashboard-agency-events" class="mb-1.5 block text-xs font-medium text-gray-600">등록기관</label>
                        <select id="filter-dashboard-agency-events" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm">
                          <option value="전체">전체</option>
                        </select>
                      </div>
                    </div>
                    <div class="grid gap-4 lg:grid-cols-2">
                      <div class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                        <h3 class="mb-3 text-sm font-bold text-gray-900">최근 5년 철도사고 발생현황</h3>
                        <div class="h-80">
                          <canvas id="chart-tab-recent5-accidents"></canvas>
                        </div>
                      </div>
                      <div class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                        <h3 class="mb-3 text-sm font-bold text-gray-900">최근 5년 운행장애 발생현황</h3>
                        <div class="h-80">
                          <canvas id="chart-tab-recent5-disruptions"></canvas>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div id="dashboard-tab-panel-recent5-casualties" class="dashboard-tab-panel mt-4 hidden space-y-4" role="tabpanel" aria-hidden="true">
                    <div class="flex flex-wrap items-end gap-4 rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                      <div class="min-w-[140px]">
                        <label for="filter-dashboard-rail-casualties" class="mb-1.5 block text-xs font-medium text-gray-600">철도구분</label>
                        <select id="filter-dashboard-rail-casualties" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm">
                          <option value="전체">전체</option>
                        </select>
                      </div>
                      <div class="min-w-[160px]">
                        <label for="filter-dashboard-agency-casualties" class="mb-1.5 block text-xs font-medium text-gray-600">등록기관</label>
                        <select id="filter-dashboard-agency-casualties" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm">
                          <option value="전체">전체</option>
                        </select>
                      </div>
                    </div>
                    <div class="grid gap-4 lg:grid-cols-2">
                      <div class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                        <h3 class="mb-3 text-sm font-bold text-gray-900">최근 5년 사망 발생현황</h3>
                        <div class="h-80">
                          <canvas id="chart-tab-recent5-deaths"></canvas>
                        </div>
                      </div>
                      <div class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                        <h3 class="mb-3 text-sm font-bold text-gray-900">최근 5년 부상(중상) 발생현황</h3>
                        <div class="h-80">
                          <canvas id="chart-tab-recent5-injuries"></canvas>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <section id="portal-combined-trends-section" class="hidden grid gap-4 lg:grid-cols-2">
                  <div class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                    <h3 class="mb-3 text-sm font-bold text-gray-900">최근 5년 운행장애 발생현황</h3>
                    <div class="h-80">
                      <canvas id="chart-combined-disruptions"></canvas>
                    </div>
                  </div>
                  <div class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm">
                    <h3 class="mb-3 text-sm font-bold text-gray-900">최근 5년 철도사고 발생현황</h3>
                    <div class="h-80">
                      <canvas id="chart-combined-accidents"></canvas>
                    </div>
                  </div>
                </section>

                <section id="month-compare-root" class="hidden space-y-4">
                  <div class="grid gap-4 lg:grid-cols-2">
                    <div
                      id="panel-prev-month-accidents"
                      class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm"
                    ></div>
                    <div
                      id="panel-current-month-accidents"
                      class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm"
                    ></div>
                  </div>
                  <div class="grid gap-4 lg:grid-cols-2">
                    <div
                      id="panel-prev-month-disruptions"
                      class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm"
                    ></div>
                    <div
                      id="panel-current-month-disruptions"
                      class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm"
                    ></div>
                  </div>
                </section>

                <section id="year-status-root-legacy" class="hidden">
                  <div class="grid gap-4 lg:grid-cols-2">
                    <div id="panel-year-accidents-legacy" class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm"></div>
                    <div id="panel-year-disruptions-legacy" class="rounded-sm border border-gray-300 bg-white p-4 shadow-sm"></div>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="border-t border-gray-200 bg-gray-100 px-4 py-10 sm:px-6 lg:px-8">
      <div class="mx-auto max-w-7xl text-left">
        <div class="flex flex-col items-start gap-2">
          <a
            href="/login"
            class="text-sm text-gray-700 no-underline transition hover:underline underline-offset-4"
          >
            지자체 안전정보
          </a>
          <a
            href="/dashboard/self-report"
            class="text-sm text-gray-700 no-underline transition hover:underline underline-offset-4"
          >
            자율보고
          </a>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/usage-tracker.js"></script>
    <script src="/js/branding.js"></script>
    <script src="/js/public-board-layout.js"></script>
    <script src="/js/dashboard-month-panels.js"></script>
    <script src="/js/portal-dashboard-tabs.js"></script>
    <script src="/js/portal-dashboard.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          await loadPublicBranding();
          initPublicBoardLayout();
          initPortalDashboard({ guest: true });
        } catch (error) {
          console.error("Public accident dashboard init failed:", error);
        }
      });
    </script>
  </body>
</html>
